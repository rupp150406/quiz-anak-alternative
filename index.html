<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap');

    :root {
        --bg-image: url('https://ahsan.tv/wp-content/uploads/2026/05/banner.webp');
        --card-bg: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        --card-border: 2px solid rgba(255,255,255,0.85);
        --card-shadow: 0 15px 35px rgba(30, 120, 180, 0.25);
        --card-hover-bg: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, rgba(185,230,255,0.80) 100%);
        --text-color: #0d5c8a;
        --loader-dot-bg: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        --loader-dot-border: 2px solid rgba(255,255,255,0.85);
        --loader-dot-shadow: 0 4px 12px rgba(30, 120, 180, 0.25);
        --loading-text-color: #0d5c8a;
        --loading-text-shadow: 0 1px 3px rgba(255,255,255,0.6);
        --answer-color: #000000;
        --answer-shadow: 0 2px 8px rgba(255,255,255,0.7);
        --btn-bg: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        --btn-color: #0d5c8a;
        --btn-border: 2px solid rgba(255,255,255,0.85);
        --btn-shadow: 0 15px 35px rgba(30, 120, 180, 0.25);
        --btn-hover-bg: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, rgba(185,230,255,0.80) 100%);
    }

    body.theme-emerald {
        --bg-image: url('https://ahsan.tv/wp-content/uploads/2026/06/bannerr.webp');
        --card-bg: linear-gradient(135deg, rgba(240, 245, 238, 0.75) 0%, rgba(165, 185, 155, 0.60) 100%);
        --card-border: 2px solid rgba(255, 255, 255, 0.85);
        --card-shadow: 0 15px 35px rgba(45, 60, 40, 0.25);
        --card-hover-bg: linear-gradient(135deg, rgba(245, 248, 243, 0.88) 0%, rgba(175, 195, 165, 0.75) 100%);
        --text-color: #2D3A26;
        --loader-dot-bg: linear-gradient(135deg, rgba(240, 245, 238, 0.75) 0%, rgba(165, 185, 155, 0.60) 100%);
        --loader-dot-border: 2px solid rgba(255, 255, 255, 0.85);
        --loader-dot-shadow: 0 4px 12px rgba(45, 60, 40, 0.25);
        --loading-text-color: #2D3A26;
        --loading-text-shadow: 0 1px 3px rgba(255, 255, 255, 0.6);
        --answer-color: #000000;
        --answer-shadow: 0 2px 10px rgba(255, 255, 255, 0.85);
        --btn-bg: linear-gradient(135deg, rgba(240, 245, 238, 0.75) 0%, rgba(165, 185, 155, 0.60) 100%);
        --btn-color: #2D3A26;
        --btn-border: 2px solid rgba(255, 255, 255, 0.85);
        --btn-shadow: 0 15px 35px rgba(45, 60, 40, 0.25);
        --btn-hover-bg: linear-gradient(135deg, rgba(245, 248, 243, 0.88) 0%, rgba(175, 195, 165, 0.75) 100%);
    }

    body.theme-desert {
        --bg-image: url('https://ahsan.tv/wp-content/uploads/2026/06/bannerrr.webp');
        --card-bg: linear-gradient(135deg, rgba(255, 248, 235, 0.70) 0%, rgba(230, 210, 185, 0.55) 100%);
        --card-border: 2px solid rgba(255, 255, 255, 0.80);
        --card-shadow: 0 15px 35px rgba(120, 90, 70, 0.18);
        --card-hover-bg: linear-gradient(135deg, rgba(255, 251, 242, 0.85) 0%, rgba(238, 220, 198, 0.70) 100%);
        --text-color: #5C4433;
        --loader-dot-bg: linear-gradient(135deg, rgba(255, 248, 235, 0.70) 0%, rgba(230, 210, 185, 0.55) 100%);
        --loader-dot-border: 2px solid rgba(255, 255, 255, 0.80);
        --loader-dot-shadow: 0 4px 12px rgba(120, 90, 70, 0.15);
        --loading-text-color: #5C4433;
        --loading-text-shadow: 0 1px 3px rgba(255, 255, 255, 0.6);
        --answer-color: #000000;
        --answer-shadow: 0 2px 10px rgba(255, 250, 240, 0.9);
        --btn-bg: linear-gradient(135deg, rgba(255, 248, 235, 0.70) 0%, rgba(230, 210, 185, 0.55) 100%);
        --btn-color: #5C4433;
        --btn-border: 2px solid rgba(255, 255, 255, 0.80);
        --btn-shadow: 0 15px 35px rgba(120, 90, 70, 0.18);
        --btn-hover-bg: linear-gradient(135deg, rgba(255, 251, 242, 0.85) 0%, rgba(238, 220, 198, 0.70) 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Fredoka', sans-serif;
        font-weight: 500;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow: hidden;
        transition: background-image 0.5s ease;
    }

    .container {
        width: 100%;
        max-width: 1600px;
        height: 100%;
        display: grid;
        grid-template-rows: 12% 1fr 20%;
        padding: 0 40px;
    }

    .page-wrapper {
        grid-row: 2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        position: relative;
    }

    .hidden { display: none !important; }

    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: 100;
    }

    .footer-nav {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 0 40px 40px 40px;
        pointer-events: none;
    }

    .footer-left {
        position: fixed;
        bottom: 40px;
        left: 40px;
        display: flex;
        align-items: center;
        gap: 16px;
        pointer-events: all;
    }

    .reset-btn, .back-btn {
        background: var(--btn-bg);
        color: var(--btn-color);
        border: var(--btn-border);
        padding: 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 27px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0;
        transition: all 0.3s ease;
        box-shadow: var(--btn-shadow);
        user-select: none;
        backdrop-filter: blur(6px);
        pointer-events: all;
    }

    .reset-btn:hover, .back-btn:hover {
        background: var(--btn-hover-bg);
        transform: translateY(-8px);
    }

    .reset-btn img, .back-btn img { width: 38px; height: 38px; }

    .fruits-grid, .branch-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 40px;
        width: 100%;
    }

    .fruit-card, .branch-card {
        background: var(--card-bg);
        border-radius: 35px;
        padding: 65px 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: var(--card-shadow);
        border: var(--card-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: calc(25% - 40px);
        min-width: 280px;
    }

    .fruit-card:hover:not(.disabled), .branch-card:hover:not(.disabled) {
        background: var(--card-hover-bg);
    }

    .branch-grid .branch-card {
        width: calc(20% - 40px);
        min-width: 250px;
    }

    .fruit-card.disabled, .branch-card.disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
    }

    .fruit-icon, .branch-icon, .cross-icon {
        width: 200px;
        height: 200px;
        margin-bottom: 30px;
        object-fit: contain;
    }

    .fruit-name, .branch-label {
        font-size: 42px;
        color: var(--text-color);
        line-height: 1.2;
        font-weight: 600;
        text-shadow: 0 1px 3px rgba(255,255,255,0.3);
    }

    .loader-container { text-align: center; width: 100%; }

    .ellipsis-loader {
        display: flex;
        gap: 25px;
        justify-content: center;
        margin-bottom: 30px;
    }

    .ellipsis-loader div {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: var(--loader-dot-bg);
        border: var(--loader-dot-border);
        box-shadow: var(--loader-dot-shadow);
        animation: bounce 1.2s infinite ease-in-out;
    }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); }
        40% { transform: scale(1.2); }
    }

    .loading-text { font-size: 50px; color: var(--loading-text-color); font-weight: 600; text-shadow: var(--loading-text-shadow); }

    .answer-text {
        font-size: 110px;
        color: var(--answer-color);
        font-weight: 600;
        text-align: center;
        line-height: 1.1;
        padding: 0 20px;
        text-shadow: var(--answer-shadow);
    }

    @media (max-width: 768px) {
        body { overflow-y: auto; }
        .container { grid-template-rows: auto 1fr auto; height: auto; padding: 20px; }
        .page-wrapper { margin: 30px 0; }
        .fruit-card, .branch-card { width: calc(50% - 20px) !important; min-width: 140px; padding: 30px 10px; border-radius: 20px; }
        .fruit-icon, .branch-icon { width: 100px; height: 100px; }
        .fruit-name, .branch-label { font-size: 20px; }
        .answer-text { font-size: 45px; }
        .reset-btn, .back-btn { padding: 15px; font-size: 22px; }
        .reset-btn img, .back-btn img { width: 30px; height: 30px; }
        .footer-nav { padding: 0 20px 20px 20px; }
    }

    @keyframes popUp {
        0%   { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }
    .pop-up { animation: popUp 0.4s ease-out forwards; }

    /* ── Shared bottom-right button style ── */
    .corner-btn {
        background: var(--btn-bg);
        color: var(--btn-color);
        border: var(--btn-border);
        padding: 18px;
        border-radius: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        box-shadow: var(--btn-shadow);
        user-select: none;
        backdrop-filter: blur(6px);
        pointer-events: all;
        position: fixed;
        bottom: 40px;
        z-index: 200;
    }
    .corner-btn:hover { transform: translateY(-8px); }
    .corner-btn img { width: 38px; height: 38px; }

    .theme-btn { right: 40px; }
    .iconset-btn { right: 126px; }

    /* ── Shared panel style ── */
    .popup-panel {
        position: fixed;
        bottom: 110px;
        z-index: 300;
        display: flex;
        flex-direction: column;
        gap: 14px;
        opacity: 0;
        transform: translateY(20px) scale(0.95);
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: none;
    }
    .popup-panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
    }
    .theme-panel { right: 40px; }
    .iconset-panel { right: 110px; }

    /* ── Theme options ── */
    .theme-option {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 24px;
        font-weight: 600;
        transition: all 0.25s ease;
        white-space: nowrap;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        border: 2px solid rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        user-select: none;
    }
    .theme-option .dot {
        width: 18px; height: 18px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid currentColor;
    }
    .theme-option.active .dot { box-shadow: 0 0 0 3px currentColor; }

    .theme-option.theme-cloudy { background: linear-gradient(135deg, rgba(255,255,255,0.82) 0%, rgba(185,230,255,0.72) 100%); color: #0d5c8a; }
    .theme-option.theme-cloudy:hover, .theme-option.theme-cloudy.active { background: linear-gradient(135deg, rgba(255,255,255,0.96) 0%, rgba(185,230,255,0.92) 100%); transform: translateX(-6px); }
    .theme-option.theme-cloudy .dot { background: #57b4e8; }

    .theme-option.theme-jade { background: linear-gradient(135deg, #6E7E67 0%, #4a5245 100%); color: #ffffff; border-color: rgba(255,255,255,0.3); }
    .theme-option.theme-jade:hover, .theme-option.theme-jade.active { background: linear-gradient(135deg, #7e9076 0%, #3d4439 100%); transform: translateX(-6px); }
    .theme-option.theme-jade .dot { background: #a3b89a; }

    .theme-option.theme-desert { background: linear-gradient(135deg, rgba(255, 248, 235, 0.92) 0%, rgba(230, 210, 185, 0.85) 100%); color: #5C4433; border-color: rgba(255,255,255,0.8); }
    .theme-option.theme-desert:hover, .theme-option.theme-desert.active { background: linear-gradient(135deg, rgba(255, 251, 242, 0.98) 0%, rgba(238, 220, 198, 0.95) 100%); transform: translateX(-6px); }
    .theme-option.theme-desert .dot { background: #c8a97a; }

    /* ── Icon set options ── */
    .iconset-option {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 24px;
        font-weight: 600;
        transition: all 0.25s ease;
        white-space: nowrap;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        border: 2px solid rgba(255,255,255,0.85);
        backdrop-filter: blur(10px);
        user-select: none;
        background: linear-gradient(135deg, rgba(255,255,255,0.82) 0%, rgba(220,235,255,0.72) 100%);
        color: #1a3a5c;
    }
    .iconset-option:hover, .iconset-option.active {
        background: linear-gradient(135deg, rgba(255,255,255,0.96) 0%, rgba(200,220,255,0.92) 100%);
        transform: translateX(-6px);
    }
    .iconset-option.active {
        border-color: rgba(100,160,255,0.8);
        box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 0 0 2px rgba(100,160,255,0.4);
    }
    .iconset-option .preview-icons {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-shrink: 0;
    }
    .iconset-option .preview-icons img {
        width: 34px;
        height: 34px;
        object-fit: contain;
    }

    @media (max-width: 768px) {
        .corner-btn { bottom: 20px; padding: 12px; }
        .corner-btn img { width: 28px; height: 28px; }
        .theme-btn { right: 20px; }
        .iconset-btn { right: 96px; }
        .popup-panel { bottom: 88px; }
        .theme-panel { right: 20px; }
        .iconset-panel { right: 96px; }
        .theme-option { font-size: 18px; padding: 10px 16px; }
        .iconset-option { font-size: 18px; padding: 10px 16px; }
        .iconset-option .preview-icons img { width: 24px; height: 24px; }
    }
</style>
</head>
<body>
    <div class="container">
        <div></div>
        <main class="page-wrapper" id="pageContent">
            
            <div class="loader-container hidden" id="globalLoader">
                <div class="ellipsis-loader"><div></div><div></div><div></div></div>
                <div class="loading-text" id="loaderText">Sedang Memuat...</div>

            <div id="mainView" class="width-full">
                <div class="fruits-grid pop-up" id="fruitsGrid">
                    <div class="fruit-card" onclick="selectFruit('pineapple')">

                    <div class="fruit-card" onclick="selectFruit('apple')">

                    </div>
                    <div class="fruit-card" onclick="selectFruit('watermelon')">

            <div id="branchView" class="hidden width-full">

        </main>
    </div>

    <footer>
        <div class="footer-left">

            <button class="back-btn hidden" id="backBtn" onclick="goBack()">
                <img src="https://ahsan.tv/wp-content/uploads/2026/05/arrow.webp" alt="">
                <span>Kembali</span>
            </button>
        </div>
    </footer>

    <!-- Theme panel -->
    <div class="popup-panel theme-panel" id="themePanel">

        </div>

            <span class="dot"></span>

        </div>
        <div class="theme-option theme-desert" onclick="applyTheme('desert')" id="opt-desert">
            <span class="dot"></span>

                <img src="https://ahsan.tv/wp-content/uploads/2026/06/kereta.webp" alt="">

    <audio id="clickSound" preload="auto"><source src="https://ahsan.tv/wp-content/uploads/2026/05/click.mp3" type="audio/mp3"></audio>
    <audio id="backSound" preload="auto"><source src="https://ahsan.tv/wp-content/uploads/2026/05/back.mp3" type="audio/mp3"></audio>

    <script>
        let usedBranches = JSON.parse(localStorage.getItem('usedBranches')) || {};
        let currentFruit = null;
        let audioEnabled = false;

        const contentData = {
            pineapple: [
                "وَصَدَّقَ بِالْحُسْنَىٰ",

        /* Active branch options, switched by icon set selector */

        let iconsetPanelOpen = false;

        function applyIconSet(setName) {
            playClick();
            activeBranchOptions = allBranchOptions[setName];
            localStorage.setItem(ICONSET_KEY, setName);

            /* Update button preview icon */
            const previews = {
                vehicles: 'https://ahsan.tv/wp-content/uploads/2026/06/pemadam.webp',
                fruits:   'https://ahsan.tv/wp-content/uploads/2026/05/pineapple.webp',

                places:   'https://ahsan.tv/wp-content/uploads/2026/06/gunung.webp'
            };
            document.getElementById('iconsetBtnImg').src = previews[setName];

            /* Highlight active option */
            document.querySelectorAll('.iconset-option').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('iconopt-' + setName);
            if (activeEl) activeEl.classList.add('active');

            setTimeout(() => {
                iconsetPanelOpen = false;
                document.getElementById('iconsetPanel').classList.remove('open');
            }, 300);
        }

        function toggleIconsetPanel() {
            enableAudio();
            iconsetPanelOpen = !iconsetPanelOpen;
            document.getElementById('iconsetPanel').classList.toggle('open', iconsetPanelOpen);
            if (iconsetPanelOpen && themePanelOpen) {
                themePanelOpen = false;
                document.getElementById('themePanel').classList.remove('open');
            }
        }

        /* Init icon set from localStorage */
        (function initIconSet() {
            const saved = localStorage.getItem(ICONSET_KEY) || 'vehicles';
            applyIconSet(saved);
        })();

        let assignedCountries = JSON.parse(localStorage.getItem('assignedCountries')) || null;

        function playClick() { document.getElementById('clickSound').play().catch(()=>{}); }
        function playBack()  { document.getElementById('backSound').play().catch(()=>{}); }

        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                [document.getElementById('clickSound'), document.getElementById('backSound')].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; });
                });
            }
        }

        function buildAssignedCountries() {
            assignedCountries = {};
            Object.keys(contentData).forEach(fruit => {
                const a = [...contentData[fruit]];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                assignedCountries[fruit] = a;
            });
            localStorage.setItem('assignedCountries', JSON.stringify(assignedCountries));
        }

        function selectFruit(fruitName) {
            playClick(); enableAudio();
            currentFruit = fruitName;
            document.getElementById('mainView').classList.add('hidden');
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Sedang Memuat...";
            loader.classList.remove('hidden');
            setTimeout(() => {
                loader.classList.add('hidden');
                openBranchPage(fruitName);
            }, 800);
        }

        function openBranchPage(fruitName) {
            const grid = document.getElementById('branchGrid');
            grid.innerHTML = '';
            const used = usedBranches[fruitName] || [];

            activeBranchOptions[fruitName].forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = `branch-card ${used.includes(i) ? 'disabled' : ''}`;
                if (used.includes(i)) {
                    card.innerHTML = `<img src="https://ahsan.tv/wp-content/uploads/2026/05/cross.webp" class="cross-icon" alt="Sudah digunakan"><div class="branch-label">${opt.label}</div>`;
                } else {
                    card.innerHTML = `<img src="${opt.icon}" class="branch-icon" alt="${opt.label}"><div class="branch-label">${opt.label}</div>`;
                    card.onclick = () => selectBranch(i);
                }
                grid.appendChild(card);
            });

            document.getElementById('branchView').classList.remove('hidden');
            grid.classList.remove('hidden');
            grid.classList.add('pop-up');
            document.getElementById('backBtn').classList.remove('hidden');
        }

        function selectBranch(index) {
            playClick();
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Mencari...";
            loader.classList.remove('hidden');
            setTimeout(() => {
                if (!usedBranches[currentFruit]) usedBranches[currentFruit] = [];
                usedBranches[currentFruit].push(index);
                localStorage.setItem('usedBranches', JSON.stringify(usedBranches));
                document.getElementById('answerText').textContent = assignedCountries[currentFruit][index];
                loader.classList.add('hidden');
                document.getElementById('detailView').classList.remove('hidden');
                document.getElementById('backBtn').classList.remove('hidden');
            }, 800);
        }

        function goBack() {
            playBack();
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('fruitsGrid').classList.remove('hidden');
            document.getElementById('globalLoader').classList.add('hidden');
        }

        function resetAll() {
            enableAudio();
            localStorage.removeItem('usedBranches');
            usedBranches = {};
            buildAssignedCountries();
            location.reload();
        }

        if (!assignedCountries) buildAssignedCountries();

        /* ── Theme Switcher ── */
        let themePanelOpen = false;
        const THEME_KEY = 'selectedTheme';

        function toggleThemePanel() {
            enableAudio();
            themePanelOpen = !themePanelOpen;
            document.getElementById('themePanel').classList.toggle('open', themePanelOpen);
            if (themePanelOpen && iconsetPanelOpen) {
                iconsetPanelOpen = false;
                document.getElementById('iconsetPanel').classList.remove('open');
            }
        }

        function applyTheme(theme) {
            playClick();
            document.body.classList.remove('theme-emerald', 'theme-desert');
            if (theme === 'emerald') document.body.classList.add('theme-emerald');
            else if (theme === 'desert') document.body.classList.add('theme-desert');
            localStorage.setItem(THEME_KEY, theme);
            document.getElementById('opt-cloudy').classList.toggle('active', theme === 'cloudy');
            document.getElementById('opt-emerald').classList.toggle('active', theme === 'emerald');
            document.getElementById('opt-desert').classList.toggle('active', theme === 'desert');
            setTimeout(() => {
                themePanelOpen = false;
                document.getElementById('themePanel').classList.remove('open');
            }, 300);
        }

        document.addEventListener('click', function(e) {
            if (themePanelOpen &&
                !document.getElementById('themePanel').contains(e.target) &&
                !document.getElementById('themeBtn').contains(e.target)) {
                themePanelOpen = false;
                document.getElementById('themePanel').classList.remove('open');
            }
            if (iconsetPanelOpen &&
                !document.getElementById('iconsetPanel').contains(e.target) &&
                !document.getElementById('iconsetBtn').contains(e.target)) {
                iconsetPanelOpen = false;
                document.getElementById('iconsetPanel').classList.remove('open');
            }
        });

        (function initTheme() {
            const saved = localStorage.getItem(THEME_KEY) || 'cloudy';
            applyTheme(saved);
        })();
