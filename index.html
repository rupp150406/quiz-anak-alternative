<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Quiz interaktif islami untuk anak-anak: tebak ayat Al-Quran, Hadits Nabi, Doa sehari-hari, dan Bahasa Arab. Cocok untuk program AhsanTV bersama Abu Sahla.">
    <meta property="og:title" content="Quiz Surat">
    <meta property="og:description" content="Quiz Surat untuk program ahsantv bersama abu sahla">
    <meta property="og:image" content="https://ahsan.tv/wp-content/uploads/2026/05/preview.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="https://ahsan.tv/wp-content/uploads/2026/05/quran.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="https://ahsan.tv/wp-content/uploads/2026/05/ahsan.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <meta name="google-site-verification" content="7pPrOCq2OIaUWLrs53SGGeJ1FYkgBXU0Du2NWr2mCqQ" />
    <title>Quiz Surat</title>
<style>
    /* Mengambil font Fredoka dengan weight 500 (Medium) & 600 dari Google Fonts API */
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        /* Menggunakan font Fredoka dari Google Fonts */
        font-family: 'Fredoka', sans-serif;
        font-weight: 500; /* Set default ke Medium */
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        background-image: url('https://ahsan.tv/wp-content/uploads/2026/05/banner.webp');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow: hidden;
    }

    .container {
        width: 100%;
        max-width: 1600px;
        height: 100%;
        display: grid;
        grid-template-rows: 12% 1fr 20%; 
        padding: 0 40px;
    }

    .page-wrapper {
        grid-row: 2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        position: relative;
    }

    .hidden { display: none !important; }

    /* ── Footer & Tombol Bawah ── */
    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: 100;
    }

    .footer-nav {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 0 40px 40px 40px;
        pointer-events: none;
    }

    /* ── Grup tombol kiri bawah ── */
    .footer-left {
        position: fixed;
        bottom: 40px;
        left: 40px;
        display: flex;
        align-items: center;
        gap: 16px;
        pointer-events: all;
    }

    .reset-btn, .back-btn {
        background: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        color: #0d5c8a;
        border: 2px solid rgba(255,255,255,0.85);
        padding: 18px; /* Ikon saja */
        border-radius: 20px;
        cursor: pointer;
        font-size: 27px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0;
        transition: all 0.3s ease;
        box-shadow: 0 15px 35px rgba(30, 120, 180, 0.25);
        user-select: none;
        backdrop-filter: blur(6px);
        pointer-events: all;
    }

    .reset-btn:hover, .back-btn:hover {
        background: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, rgba(185,230,255,0.80) 100%);
        transform: translateY(-8px);
    }

    .reset-btn img, .back-btn img { width: 38px; height: 38px; }

    /* ── Solusi Grid Merapat ke Tengah ── */
    .fruits-grid, .branch-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 40px;
        width: 100%;
    }

    .fruit-card, .branch-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        border-radius: 35px;
        padding: 65px 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 15px 35px rgba(30, 120, 180, 0.25);
        border: 2px solid rgba(255,255,255,0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: calc(25% - 40px);
        min-width: 280px;
    }

    .branch-grid .branch-card {
        width: calc(20% - 40px); 
        min-width: 250px;
    }

    .fruit-card.disabled, .branch-card.disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
    }

    .fruit-icon, .branch-icon, .cross-icon {
        width: 200px;
        height: 200px;
        margin-bottom: 30px;
        object-fit: contain;
    }

    .fruit-name, .branch-label {
        font-size: 42px;
        color: #0d5c8a;
        line-height: 1.2;
        font-weight: 600;
        text-shadow: 0 1px 3px rgba(255,255,255,0.6);
    }

    /* ── Loader ── */
    .loader-container {
        text-align: center;
        width: 100%;
    }

    .ellipsis-loader {
        display: flex;
        gap: 25px;
        justify-content: center;
        margin-bottom: 30px;
    }

    .ellipsis-loader div {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(185,230,255,0.65) 100%);
        border: 2px solid rgba(255,255,255,0.85);
        box-shadow: 0 4px 12px rgba(30, 120, 180, 0.25);
        animation: bounce 1.2s infinite ease-in-out;
    }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); }
        40% { transform: scale(1.2); }
    }

    .loading-text { font-size: 50px; color: #0d5c8a; font-weight: 600; text-shadow: 0 1px 3px rgba(255,255,255,0.6); }

    .answer-text {
        font-size: 110px;
        color: #000000;
        font-weight: 600;
        text-align: center;
        line-height: 1.1;
        padding: 0 20px;
        text-shadow: 0 2px 8px rgba(255,255,255,0.7);
    }

    /* ── Responsive Mobile ── */
    @media (max-width: 768px) {
        body { overflow-y: auto; }
        .container { grid-template-rows: auto 1fr auto; height: auto; padding: 20px; }
        .page-wrapper { margin: 30px 0; }
        .fruit-card, .branch-card { width: calc(50% - 20px) !important; min-width: 140px; padding: 30px 10px; border-radius: 20px; }
        .fruit-icon, .branch-icon { width: 100px; height: 100px; }
        .fruit-name, .branch-label { font-size: 20px; }
        .answer-text { font-size: 45px; }
        .reset-btn, .back-btn { padding: 15px; font-size: 22px; }
        .reset-btn img, .back-btn img { width: 30px; height: 30px; }
        .footer-nav { padding: 0 20px 20px 20px; }
    }

    @keyframes popUp {
        0%   { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }
    .pop-up { animation: popUp 0.4s ease-out forwards; }
</style>
</head>
<body>
    <div class="container">
        <div></div>
        <main class="page-wrapper" id="pageContent">
            
            <div class="loader-container hidden" id="globalLoader">
                <div class="ellipsis-loader"><div></div><div></div><div></div></div>
                <div class="loading-text" id="loaderText">Sedang Memuat...</div>
            </div>

            <div id="mainView" class="width-full">
                <div class="fruits-grid pop-up" id="fruitsGrid">
                    <div class="fruit-card" onclick="selectFruit('pineapple')">
                        <img src="https://ahsan.tv/wp-content/uploads/2026/05/quran.webp" class="fruit-icon" alt="Ikon Al-Quran">
                        <div class="fruit-name">Ayat<br>Al-Quran</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('apple')">
                        <img src="https://ahsan.tv/wp-content/uploads/2026/05/scroll.webp" class="fruit-icon" alt="Ikon Gulungan Hadits">
                        <div class="fruit-name">Hadits<br>Nabi</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('watermelon')">
                        <img src="https://ahsan.tv/wp-content/uploads/2026/05/doa.webp" class="fruit-icon" alt="Ikon Doa">
                        <div class="fruit-name">Doa - Doa</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('orange')">
                        <img src="https://ahsan.tv/wp-content/uploads/2026/05/arabic.webp" class="fruit-icon" alt="Ikon Bahasa Arab">
                        <div class="fruit-name">Bahasa<br>Arab</div>
                    </div>
                </div>
            </div>

            <div id="branchView" class="hidden width-full">
                <div class="branch-grid" id="branchGrid"></div>
            </div>

            <div id="detailView" class="hidden">
                <div class="answer-text" id="answerText"></div>
            </div>

        </main>
    </div>

    <!-- Footer dengan tombol Reset & Kembali di kiri bawah -->
    <footer>
        <div class="footer-left">
            <button class="reset-btn" id="resetBtn" onclick="resetAll()" aria-label="Reset Ulang Quiz">
                <img src="https://ahsan.tv/wp-content/uploads/2026/05/refresh.webp" alt="">
            </button>
            <button class="back-btn hidden" id="backBtn" onclick="goBack()">
                <img src="https://ahsan.tv/wp-content/uploads/2026/05/arrow.webp" alt="">
                <span>Kembali</span>
            </button>
        </div>
    </footer>

    <audio id="clickSound" preload="auto"><source src="https://ahsan.tv/wp-content/uploads/2026/05/click.mp3" type="audio/mp3"></audio>
    <audio id="backSound" preload="auto"><source src="https://ahsan.tv/wp-content/uploads/2026/05/back.mp3" type="audio/mp3"></audio>

    <script>
        let usedBranches = JSON.parse(localStorage.getItem('usedBranches')) || {};
        let currentFruit = null;
        let audioEnabled = false;

        const contentData = {
            pineapple: ["وَنَفْسٍ وَمَا سَوَّاهَا", "وَتَكُونُ ٱلْجِبَالُ كَٱلْعِهْنِ ٱلْمَنفُوشِ", "فَأَمَّا مَنْ ثَقُلَتْ مَوَازِينُهُ", "كَلَّا ۖ لَيُنْبَذَنَّ فِي الْحُطَمَةِ"],
            apple: ['Hadits Senyum adalah sedekah', 'Hadits larangan marah', 'Hadits larangan minum sambil berdiri', 'Hadits niat'],
            watermelon: ['Doa keluar masjid', 'Doa setelah hujan reda', 'Doa sesudah makan', 'Doa bangun tidur', 'Doa menggunakan baju'],
            orange: ['Bintang', 'Kursi', 'Ayam', 'Jagung', 'Pepaya']
        };

        const branchOptions = {
            pineapple: [
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/pineapple.webp', label: 'nanas' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/apple.webp', label: 'apel' },
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/watermelon.webp', label: 'semangka' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/orange.webp', label: 'jeruk' },
            ],
            apple: [
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/banana.webp', label: 'pisang' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/mango.webp', label: 'mangga' },
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/grapes.webp', label: 'anggur' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/strawberry.webp', label: 'strawberry' },
            ],
            watermelon: [
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/avocado.webp', label: 'alpukat' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/durian.webp', label: 'durian' },
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/kiwi.webp', label: 'kiwi' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/pear.webp', label: 'pir' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/mangosteen.webp', label: 'manggis' },
            ],
            orange: [
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/lychee.webp', label: 'leci' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/papaya.webp', label: 'pepaya' },
                { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/dragonfruit.webp', label: 'naga' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/cherry.webp', label: 'ceri' }, { icon: 'https://ahsan.tv/wp-content/uploads/2026/05/Pomegranate.webp', label: 'delima' },
            ],
        };

        let assignedCountries = JSON.parse(localStorage.getItem('assignedCountries')) || null;

        function playClick() { document.getElementById('clickSound').play().catch(()=>{}); }
        function playBack() { document.getElementById('backSound').play().catch(()=>{}); }

        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                [document.getElementById('clickSound'), document.getElementById('backSound')].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; });
                });
            }
        }

        function buildAssignedCountries() {
            assignedCountries = {};
            Object.keys(contentData).forEach(fruit => {
                const a = [...contentData[fruit]];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                assignedCountries[fruit] = a;
            });
            localStorage.setItem('assignedCountries', JSON.stringify(assignedCountries));
        }

        function selectFruit(fruitName) {
            playClick(); enableAudio();
            currentFruit = fruitName;
            
            document.getElementById('mainView').classList.add('hidden');
            
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Sedang Memuat...";
            loader.classList.remove('hidden');
            
            setTimeout(() => {
                loader.classList.add('hidden');
                openBranchPage(fruitName);
            }, 800);
        }

        function openBranchPage(fruitName) {
            const grid = document.getElementById('branchGrid');
            grid.innerHTML = '';
            const used = usedBranches[fruitName] || [];

            branchOptions[fruitName].forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = `branch-card ${used.includes(i) ? 'disabled' : ''}`;
                if (used.includes(i)) {
                    card.innerHTML = `<img src="https://ahsan.tv/wp-content/uploads/2026/05/cross.webp" class="cross-icon" alt="Sudah digunakan"><div class="branch-label">${opt.label}</div>`;
                } else {
                    card.innerHTML = `<img src="${opt.icon}" class="branch-icon" alt="${opt.label}"><div class="branch-label">${opt.label}</div>`;
                    card.onclick = () => selectBranch(i);
                }
                grid.appendChild(card);
            });

            document.getElementById('branchView').classList.remove('hidden');
            grid.classList.remove('hidden');
            grid.classList.add('pop-up');
            document.getElementById('backBtn').classList.remove('hidden');
        }

        function selectBranch(index) {
            playClick();
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Mencari...";
            loader.classList.remove('hidden');

            setTimeout(() => {
                if (!usedBranches[currentFruit]) usedBranches[currentFruit] = [];
                usedBranches[currentFruit].push(index);
                localStorage.setItem('usedBranches', JSON.stringify(usedBranches));
                
                document.getElementById('answerText').textContent = assignedCountries[currentFruit][index];
                loader.classList.add('hidden');
                document.getElementById('detailView').classList.remove('hidden');
                document.getElementById('backBtn').classList.remove('hidden');
            }, 800);
        }

        function goBack() {
            playBack();
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('fruitsGrid').classList.remove('hidden');
            
            document.getElementById('globalLoader').classList.add('hidden');
        }

        function resetAll() {
            enableAudio();
            localStorage.removeItem('usedBranches');
            usedBranches = {};
            buildAssignedCountries();
            location.reload();
        }

        if (!assignedCountries) buildAssignedCountries();
    </script>
</body>
</html>
