<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta property="og:title" content="Quiz Surat">
    <meta property="og:description" content="Quiz Surat untuk program ahsantv bersama abu sahla">
    <meta property="og:image" content="https://quiz-anak-alternative.vercel.app/assets/group-10.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/qurann.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/ahsan.png">
    <title>Quiz Surat</title>
    <style>
        @font-face {
            font-family: 'FredokaCustom';
            src: url('fonts/Fredoka-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'FredokaCustom', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            background-image: url('assets/banner.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            display: grid;
            grid-template-rows: 12% 1fr 20%; 
            padding: 0 40px;
        }

        .page-wrapper {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .hidden { display: none !important; }

        /* ── Tombol Bawah ── */
        .footer-nav {
            grid-row: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }

        .reset-btn, .back-btn {
            background: #6E7E67;
            color: white;
            border: none;
            padding: 25px 65px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 38px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            user-select: none;
        }

        .reset-btn:hover, .back-btn:hover {
            background: #5d6c57;
            transform: translateY(-8px);
        }

        .reset-btn img, .back-btn img { width: 55px; height: 55px; }

        /* ── Solusi Grid Merapat ke Tengah ── */
        .fruits-grid, .branch-grid {
            display: flex; /* Menggunakan flexbox untuk grid agar gampang dirapatkan ke tengah */
            flex-wrap: wrap;
            justify-content: center; /* Ini kunci agar kartu selalu di tengah */
            gap: 40px;
            width: 100%;
        }

        .fruit-card, .branch-card {
            background: linear-gradient(135deg, #6E7E67 0%, #3F433D 100%);
            border-radius: 35px;
            padding: 65px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: calc(25% - 40px); /* Standar 4 kolom */
            min-width: 280px;
        }

        /* Jika 5 item (Doa & Arab), lebar disesuaikan agar tetap sejajar */
        .branch-grid .branch-card {
            width: calc(20% - 40px); 
            min-width: 250px;
        }

        .fruit-card.disabled, .branch-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .fruit-icon, .branch-icon, .cross-icon {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            object-fit: contain;
        }

        .fruit-name, .branch-label {
            font-size: 42px;
            color: white;
            line-height: 1.2;
            font-weight: 600;
        }

        /* ── Loader ── */
        .loader-container {
            text-align: center;
            width: 100%;
        }

        .ellipsis-loader {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .ellipsis-loader div {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #6E7E67;
            animation: bounce 1.2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1.2); }
        }

        .loading-text { font-size: 50px; color: #6E7E67; font-weight: 600; }

        .answer-text {
            font-size: 110px;
            color: #3F433D;
            font-weight: 600;
            text-align: center;
            line-height: 1.1;
            padding: 0 20px;
        }

        /* ── Responsive Mobile ── */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .container { grid-template-rows: auto 1fr auto; height: auto; padding: 20px; }
            .page-wrapper { margin: 30px 0; }
            .fruit-card, .branch-card { width: calc(50% - 20px) !important; min-width: 140px; padding: 30px 10px; border-radius: 20px; }
            .fruit-icon, .branch-icon { width: 100px; height: 100px; }
            .fruit-name, .branch-label { font-size: 20px; }
            .answer-text { font-size: 45px; }
            .reset-btn, .back-btn { padding: 15px 30px; font-size: 22px; }
            .reset-btn img, .back-btn img { width: 30px; height: 30px; }
        }

        @keyframes popUp {
            0%   { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pop-up { animation: popUp 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div class="container">
        <div></div> <div class="page-wrapper" id="pageContent">
            
            <div class="loader-container hidden" id="globalLoader">
                <div class="ellipsis-loader"><div></div><div></div><div></div></div>
                <div class="loading-text" id="loaderText">Sedang Memuat...</div>
            </div>

            <div id="mainView" class="width-full">
                <div class="fruits-grid pop-up" id="fruitsGrid">
                    <div class="fruit-card" onclick="selectFruit('pineapple')">
                        <img src="assets/qurann.png" class="fruit-icon">
                        <div class="fruit-name">Ayat<br>Al-Quran</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('apple')">
                        <img src="assets/scroll.png" class="fruit-icon">
                        <div class="fruit-name">Hadits<br>Nabi</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('watermelon')">
                        <img src="assets/doa.png" class="fruit-icon">
                        <div class="fruit-name">Doa - Doa</div>
                    </div>
                    <div class="fruit-card" onclick="selectFruit('orange')">
                        <img src="assets/arabic.png" class="fruit-icon">
                        <div class="fruit-name">Bahasa<br>Arab</div>
                    </div>
                </div>
            </div>

            <div id="branchView" class="hidden width-full">
                <div class="branch-grid" id="branchGrid"></div>
            </div>

            <div id="detailView" class="hidden">
                <div class="answer-text" id="answerText"></div>
            </div>

        </div>

        <div class="footer-nav">
            <button class="reset-btn" id="resetBtn" onclick="resetAll()">
                <img src="assets/refresh.png">
                <span>Reset Ulang</span>
            </button>
            <button class="back-btn hidden" id="backBtn" onclick="goBack()">
                <img src="assets/arrow.png">
                <span>Kembali</span>
            </button>
        </div>
    </div>

    <audio id="clickSound" preload="auto"><source src="sounds/click.MP3" type="audio/mp3"></audio>
    <audio id="backSound" preload="auto"><source src="sounds/back.MP3" type="audio/mp3"></audio>

    <script>
        let usedBranches = JSON.parse(localStorage.getItem('usedBranches')) || {};
        let currentFruit = null;
        let audioEnabled = false;

        const contentData = {
            pineapple: [" . . . وَطُورِ سِينِينَ", "Al a'la", "Al a'diyat", "Adh Dhuha"],
            apple: ['Hadits senyum adalah sedekah', 'Hadits larangan marah', 'Hadits minum duduk', 'Hadits niat'],
            watermelon: ['Doa masuk WC', 'Doa orang tua', 'Doa masuk masjid', 'Doa tidur', 'Doa kendaraan'],
            orange: ['Apel', 'Jeruk', 'Sapi', 'Bulan', 'Matahari']
        };

        const branchOptions = {
            pineapple: [
                { icon: 'assets/pineapple.png', label: 'nanas' }, { icon: 'assets/apple.png', label: 'apel' },
                { icon: 'assets/watermelon.png', label: 'semangka' }, { icon: 'assets/orange.png', label: 'jeruk' },
            ],
            apple: [
                { icon: 'assets/banana.png', label: 'pisang' }, { icon: 'assets/mango.png', label: 'mangga' },
                { icon: 'assets/grapes.png', label: 'anggur' }, { icon: 'assets/strawberry.png', label: 'strawberry' },
            ],
            watermelon: [
                { icon: 'assets/avocado.png', label: 'alpukat' }, { icon: 'assets/durian.png', label: 'durian' },
                { icon: 'assets/kiwi.png', label: 'kiwi' }, { icon: 'assets/pear.png', label: 'pir' }, { icon: 'assets/mangosteen.png', label: 'manggis' },
            ],
            orange: [
                { icon: 'assets/lychee.png', label: 'leci' }, { icon: 'assets/papaya.png', label: 'pepaya' },
                { icon: 'assets/dragonfruit.png', label: 'naga' }, { icon: 'assets/cherry.png', label: 'ceri' }, { icon: 'assets/Pomegranate.png', label: 'delima' },
            ],
        };

        let assignedCountries = JSON.parse(localStorage.getItem('assignedCountries')) || null;

        function playClick() { document.getElementById('clickSound').play().catch(()=>{}); }
        function playBack() { document.getElementById('backSound').play().catch(()=>{}); }

        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                [document.getElementById('clickSound'), document.getElementById('backSound')].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; });
                });
            }
        }

        function buildAssignedCountries() {
            assignedCountries = {};
            Object.keys(contentData).forEach(fruit => {
                const a = [...contentData[fruit]];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                assignedCountries[fruit] = a;
            });
            localStorage.setItem('assignedCountries', JSON.stringify(assignedCountries));
        }

        function selectFruit(fruitName) {
            playClick(); enableAudio();
            currentFruit = fruitName;
            
            // Sembunyikan grid buah & tombol reset
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('hidden');
            
            // Tampilkan Loader
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Sedang Memuat...";
            loader.classList.remove('hidden');
            
            setTimeout(() => {
                loader.classList.add('hidden');
                openBranchPage(fruitName);
            }, 800);
        }

        function openBranchPage(fruitName) {
            const grid = document.getElementById('branchGrid');
            grid.innerHTML = '';
            const used = usedBranches[fruitName] || [];

            branchOptions[fruitName].forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = `branch-card ${used.includes(i) ? 'disabled' : ''}`;
                if (used.includes(i)) {
                    card.innerHTML = `<img src="assets/cross.png" class="cross-icon"><div class="branch-label">${opt.label}</div>`;
                } else {
                    card.innerHTML = `<img src="${opt.icon}" class="branch-icon"><div class="branch-label">${opt.label}</div>`;
                    card.onclick = () => selectBranch(i);
                }
                grid.appendChild(card);
            });

            // Pastikan view branch dan gridnya muncul
            document.getElementById('branchView').classList.remove('hidden');
            grid.classList.remove('hidden'); // Kunci perbaikan: menampilkan grid kembali
            grid.classList.add('pop-up');
            document.getElementById('backBtn').classList.remove('hidden');
        }

        function selectBranch(index) {
            playClick();
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            
            const loader = document.getElementById('globalLoader');
            document.getElementById('loaderText').textContent = "Mencari...";
            loader.classList.remove('hidden');

            setTimeout(() => {
                if (!usedBranches[currentFruit]) usedBranches[currentFruit] = [];
                usedBranches[currentFruit].push(index);
                localStorage.setItem('usedBranches', JSON.stringify(usedBranches));
                
                document.getElementById('answerText').textContent = assignedCountries[currentFruit][index];
                loader.classList.add('hidden');
                document.getElementById('detailView').classList.remove('hidden');
                document.getElementById('backBtn').classList.remove('hidden');
            }, 800);
        }

        function goBack() {
            playBack();
            // Sembunyikan semua view detail/branch
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('branchView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            
            // Kembalikan ke tampilan utama
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('fruitsGrid').classList.remove('hidden');
            document.getElementById('resetBtn').classList.remove('hidden');
            
            // Pastikan loader global tertutup
            document.getElementById('globalLoader').classList.add('hidden');
        }

        function resetAll() {
            enableAudio();
            localStorage.removeItem('usedBranches');
            usedBranches = {};
            buildAssignedCountries();
            location.reload();
        }

        if (!assignedCountries) buildAssignedCountries();
    </script>
</body>
</html>
