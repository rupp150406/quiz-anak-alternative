<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta property="og:title" content="Quiz Surat">
    <meta property="og:description" content="Quiz Surat untuk program ahsantv bersama abu sahla">
    <meta property="og:image" content="https://quiz-anak-alternative.vercel.app/assets/group-10.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/qurann.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/ahsan.png">
    <title>Quiz Surat</title>
    <style>
        @font-face {
            font-family: 'FredokaCustom';
            src: url('fonts/Fredoka-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'FredokaCustom', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            background-image: url('assets/banner.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1600px; 
            height: 90vh; /* Mengunci tinggi agar posisi tombol konsisten */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-page, .branch-page, .detail-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .hidden { display: none !important; }

        /* ── Tombol Fix di Ujung Bawah ── */
        .reset-btn, .back-btn {
            background: #6E7E67;
            color: white;
            border: none;
            padding: 25px 60px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 36px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(110, 126, 103, 0.4);
            user-select: none;
            
            /* Kunci di posisi bawah tanpa mendorong elemen lain */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 10;
        }

        .reset-btn:hover, .back-btn:hover {
            background: #5d6c57;
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 15px 35px rgba(110, 126, 103, 0.5);
        }

        .reset-btn img, .back-btn img {
            width: 50px;
            height: 50px;
        }

        /* ── Grid Layout ── */
        .fruits-grid, .branch-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            width: 100%;
            margin-top: 100px; /* Menurunkan grid sedikit saja sesuai permintaan */
            padding-bottom: 150px; /* Memberi ruang agar tidak tertutup tombol */
        }

        .branch-grid:has(.branch-card:nth-child(5)) {
            grid-template-columns: repeat(5, 1fr);
        }

        .fruit-card, .branch-card {
            background: linear-gradient(135deg, #6E7E67 0%, #3F433D 100%);
            border-radius: 35px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fruit-card:hover:not(.disabled), .branch-card:hover:not(.disabled) {
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(110, 126, 103, 0.6);
        }

        .fruit-card.disabled, .branch-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .fruit-icon, .branch-icon, .cross-icon {
            width: 220px;
            height: 220px;
            margin-bottom: 25px;
            object-fit: contain;
        }

        .fruit-name, .branch-label {
            font-size: 48px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            text-transform: capitalize;
        }

        /* ── Loader ── */
        .loader-container {
            display: none;
            text-align: center;
            /* Posisikan persis di tengah layar tanpa terdorong tombol */
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }

        .loader-container.active { display: block; }

        .ellipsis-loader {
            display: inline-flex;
            gap: 25px;
            margin-bottom: 30px;
        }

        .ellipsis-loader div {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #6E7E67;
            animation: ellipsisAnimation 1.2s infinite ease-in-out;
        }

        @keyframes ellipsisAnimation {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        .loading-text {
            font-size: 48px;
            color: #6E7E67;
            font-weight: 600;
        }

        /* ── Detail Page ── */
        .answer-text {
            font-size: 110px;
            color: #3F433D;
            font-weight: 600;
            line-height: 1.2;
            text-align: center;
            padding: 0 40px;
            /* Pusatkan di tengah vertical antara atas layar dan area tombol */
            margin-top: auto;
            margin-bottom: auto;
            height: calc(100% - 150px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Responsive Tablet/Laptop ── */
        @media (max-width: 1200px) {
            .fruit-icon, .branch-icon { width: 150px; height: 150px; }
            .fruit-name, .branch-label { font-size: 32px; }
            .answer-text { font-size: 80px; }
            .fruits-grid, .branch-grid { gap: 20px; margin-top: 60px; }
            .reset-btn, .back-btn { font-size: 28px; padding: 20px 45px; }
        }

        /* ── Responsive Mobile ── */
        @media (max-width: 768px) {
            body { align-items: center; }
            .container { height: 95vh; }
            .fruits-grid, .branch-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                margin-top: 40px;
                padding-bottom: 100px;
            }
            .fruit-card, .branch-card { padding: 25px 15px; border-radius: 20px; }
            .fruit-icon, .branch-icon, .cross-icon { width: 100px; height: 100px; }
            .fruit-name, .branch-label { font-size: 20px; }
            .answer-text { font-size: 42px; }
            .reset-btn, .back-btn { padding: 12px 30px; font-size: 20px; bottom: 10px; }
            .reset-btn img, .back-btn img { width: 25px; height: 25px; }
            .loading-text { font-size: 24px; }
        }

        @keyframes popUp {
            0%   { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .pop-up .fruit-card, .pop-up .branch-card { animation: popUp 0.5s ease forwards; }
    </style>
</head>
<body>
    <div class="container">

        <div class="main-page" id="mainPage">
            <div class="loader-container" id="loader">
                <div class="ellipsis-loader">
                    <div></div><div></div><div></div>
                </div>
                <div class="loading-text">Sedang Memuat...</div>
            </div>

            <div class="fruits-grid" id="fruitsGrid">
                <div class="fruit-card" onclick="selectFruit('pineapple')">
                    <img src="assets/qurann.png" class="fruit-icon">
                    <div class="fruit-name">Ayat<br>Al-Quran</div>
                </div>
                <div class="fruit-card" onclick="selectFruit('apple')">
                    <img src="assets/scroll.png" class="fruit-icon">
                    <div class="fruit-name">Hadits<br>Nabi</div>
                </div>
                <div class="fruit-card" onclick="selectFruit('watermelon')">
                    <img src="assets/doa.png" class="fruit-icon">
                    <div class="fruit-name">Doa - Doa</div>
                </div>
                <div class="fruit-card" onclick="selectFruit('orange')">
                    <img src="assets/arabic.png" class="fruit-icon">
                    <div class="fruit-name">Bahasa<br>Arab</div>
                </div>
            </div>

            <button class="reset-btn" id="resetBtn" onclick="resetAll()">
                <img src="assets/refresh.png">
                <span>Reset Ulang</span>
            </button>
        </div>

        <div class="branch-page hidden" id="branchPage">
            <div class="loader-container" id="branchLoader">
                <div class="ellipsis-loader">
                    <div></div><div></div><div></div>
                </div>
                <div class="loading-text">Mencari...</div>
            </div>
            <div class="branch-grid" id="branchGrid"></div>
            <button class="back-btn" id="branchBackBtn" onclick="goBack()" style="display:none;">
                <img src="assets/arrow.png">
                <span>Kembali</span>
            </button>
        </div>

        <div class="detail-page hidden" id="detailPage">
            <div class="answer-text" id="answerText"></div>
            <button class="back-btn" onclick="goBack()">
                <img src="assets/arrow.png">
                <span>Kembali</span>
            </button>
        </div>

    </div>

    <audio id="clickSound" preload="auto"><source src="sounds/click.MP3" type="audio/mp3"></audio>
    <audio id="backSound" preload="auto"><source src="sounds/back.MP3" type="audio/mp3"></audio>

    <script>
        let usedBranches = JSON.parse(localStorage.getItem('usedBranches')) || {};
        let currentFruit = null;
        let audioEnabled = false;

        const contentData = {
            pineapple: [" . . . وَطُورِ سِينِينَ", "Al a'la", "Al a'diyat", "Adh Dhuha"],
            apple: ['Hadits senyum adalah sedekah', 'Hadits larangan marah', 'Hadits minum duduk', 'Hadits niat'],
            watermelon: ['Doa masuk WC', 'Doa orang tua', 'Doa masuk masjid', 'Doa tidur', 'Doa kendaraan'],
            orange: ['Apel', 'Jeruk', 'Sapi', 'Bulan', 'Matahari']
        };

        const branchOptions = {
            pineapple: [
                { icon: 'assets/pineapple.png', label: 'nanas' },
                { icon: 'assets/apple.png', label: 'apel' },
                { icon: 'assets/watermelon.png', label: 'semangka' },
                { icon: 'assets/orange.png', label: 'jeruk' },
            ],
            apple: [
                { icon: 'assets/banana.png', label: 'pisang' },
                { icon: 'assets/mango.png', label: 'mangga' },
                { icon: 'assets/grapes.png', label: 'anggur' },
                { icon: 'assets/strawberry.png', label: 'strawberry' },
            ],
            watermelon: [
                { icon: 'assets/avocado.png', label: 'alpukat' },
                { icon: 'assets/durian.png', label: 'durian' },
                { icon: 'assets/kiwi.png', label: 'kiwi' },
                { icon: 'assets/pear.png', label: 'pir' },
                { icon: 'assets/mangosteen.png', label: 'manggis' },
            ],
            orange: [
                { icon: 'assets/lychee.png', label: 'leci' },
                { icon: 'assets/papaya.png', label: 'pepaya' },
                { icon: 'assets/dragonfruit.png', label: 'naga' },
                { icon: 'assets/cherry.png', label: 'ceri' },
                { icon: 'assets/Pomegranate.png', label: 'delima' },
            ],
        };

        let assignedCountries = JSON.parse(localStorage.getItem('assignedCountries')) || null;

        function playClick() { document.getElementById('clickSound').play().catch(()=>{}); }
        function playBack() { document.getElementById('backSound').play().catch(()=>{}); }

        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                [document.getElementById('clickSound'), document.getElementById('backSound')].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; });
                });
            }
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function buildAssignedCountries() {
            assignedCountries = {};
            Object.keys(contentData).forEach(fruit => {
                assignedCountries[fruit] = shuffleArray(contentData[fruit]);
            });
            localStorage.setItem('assignedCountries', JSON.stringify(assignedCountries));
        }

        function init() {
            if (!assignedCountries) buildAssignedCountries();
            document.getElementById('fruitsGrid').classList.add('pop-up');
        }

        function selectFruit(fruitName) {
            playClick();
            enableAudio();
            currentFruit = fruitName;
            document.getElementById('fruitsGrid').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('hidden');
            document.getElementById('loader').classList.add('active');
            setTimeout(() => {
                document.getElementById('loader').classList.remove('active');
                document.getElementById('mainPage').classList.add('hidden');
                openBranchPage(fruitName);
            }, 800);
        }

        function openBranchPage(fruitName) {
            const branchPage = document.getElementById('branchPage');
            const branchGrid = document.getElementById('branchGrid');
            const backBtn = document.getElementById('branchBackBtn');
            
            branchGrid.innerHTML = '';
            const options = branchOptions[fruitName];
            const used = usedBranches[fruitName] || [];

            options.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = `branch-card ${used.includes(i) ? 'disabled' : ''}`;
                if (used.includes(i)) {
                    card.innerHTML = `<img src="assets/cross.png" class="cross-icon"><div class="branch-label">${opt.label}</div>`;
                } else {
                    card.innerHTML = `<img src="${opt.icon}" class="branch-icon"><div class="branch-label">${opt.label}</div>`;
                    card.onclick = () => selectBranch(i);
                }
                branchGrid.appendChild(card);
            });

            branchPage.classList.remove('hidden');
            branchGrid.classList.remove('hidden');
            backBtn.style.display = 'flex';
            branchGrid.classList.add('pop-up');
        }

        function selectBranch(index) {
            playClick();
            document.getElementById('branchGrid').classList.add('hidden');
            document.getElementById('branchBackBtn').style.display = 'none';
            document.getElementById('branchLoader').classList.add('active');
            setTimeout(() => {
                if (!usedBranches[currentFruit]) usedBranches[currentFruit] = [];
                usedBranches[currentFruit].push(index);
                localStorage.setItem('usedBranches', JSON.stringify(usedBranches));
                document.getElementById('answerText').textContent = assignedCountries[currentFruit][index];
                document.getElementById('branchLoader').classList.remove('active');
                document.getElementById('branchPage').classList.add('hidden');
                document.getElementById('detailPage').classList.remove('hidden');
            }, 800);
        }

        function goBack() {
            playBack();
            document.getElementById('detailPage').classList.add('hidden');
            document.getElementById('branchPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('fruitsGrid').classList.remove('hidden');
            document.getElementById('resetBtn').classList.remove('hidden');
            document.getElementById('fruitsGrid').classList.add('pop-up');
        }

        function resetAll() {
            enableAudio();
            localStorage.removeItem('usedBranches');
            usedBranches = {};
            buildAssignedCountries();
            location.reload();
        }

        init();
    </script>
</body>
</html>
